<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loïc Pidoux — Photographies</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f1ec;
      color: #111;
    }

    header {
      padding: 48px 40px 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 30px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 72px);
      font-weight: 400;
      letter-spacing: -0.04em;
      line-height: 0.95;
    }

    .intro {
      max-width: 360px;
      font-size: 15px;
      line-height: 1.5;
      padding-top: 8px;
    }

    .gallery {
      padding: 20px 40px 60px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .gallery img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      display: block;
      cursor: pointer;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .gallery img:hover {
      transform: scale(0.985);
      opacity: 0.9;
    }

    footer {
      padding: 0 40px 40px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
    }

    .lightbox {
      display: none;
      position: fixed;
      z-index: 999;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 95vw;
      max-height: 92vh;
      object-fit: contain;
    }

    .close {
      position: fixed;
      top: 24px;
      right: 32px;
      color: white;
      font-size: 34px;
      font-weight: 300;
      cursor: pointer;
      line-height: 1;
      z-index: 1001;
    }

    .nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      color: white;
      font-size: 56px;
      font-weight: 200;
      cursor: pointer;
      user-select: none;
      padding: 20px;
      z-index: 1001;
    }

    .prev {
      left: 20px;
    }

    .next {
      right: 20px;
    }

    .counter {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 14px;
      opacity: 0.8;
      z-index: 1001;
    }

    @media (max-width: 900px) {
      header {
        flex-direction: column;
      }

      .gallery {
        grid-template-columns: 1fr;
      }

      .gallery img {
        height: auto;
      }

      footer {
        flex-direction: column;
      }

      .nav {
        font-size: 42px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Loïc Pidoux<br>Photographies</h1>

    <div class="intro">
      Sélection de photographies, repérages et images personnelles.
    </div>
  </header>

  <main class="gallery">
    <img src="images/photo-01.jpg" alt="" onclick="openLightbox(0)">
    <img src="images/photo-02.jpg" alt="" onclick="openLightbox(1)">
    <img src="images/photo-03.jpg" alt="" onclick="openLightbox(2)">
  </main>

  <footer>
    <div>© Loïc Pidoux</div>
    <div><a href="mailto:pidouxloic@gmail.com">pidouxloic@gmail.com</a></div>
  </footer>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <span class="nav prev" onclick="event.stopPropagation(); previousImage();">‹</span>
    <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation();">
    <span class="nav next" onclick="event.stopPropagation(); nextImage();">›</span>
    <div class="counter" id="counter"></div>
  </div>

  <script>
    const images = [
      "images/photo-01.jpg",
      "images/photo-02.jpg",
      "images/photo-03.jpg"
    ];

    let currentIndex = 0;

    function openLightbox(index) {
      currentIndex = index;
      updateLightboxImage();
      document.getElementById('lightbox').classList.add('active');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.getElementById('lightbox-img').src = '';
    }

    function updateLightboxImage() {
      document.getElementById('lightbox-img').src = images[currentIndex];
      document.getElementById('counter').textContent = (currentIndex + 1) + " / " + images.length;
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % images.length;
      updateLightboxImage();
    }

    function previousImage() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      updateLightboxImage();
    }

    document.addEventListener('keydown', function(event) {
      const lightboxIsOpen = document.getElementById('lightbox').classList.contains('active');

      if (!lightboxIsOpen) return;

      if (event.key === 'Escape') {
        closeLightbox();
      }

      if (event.key === 'ArrowRight') {
        nextImage();
      }

      if (event.key === 'ArrowLeft') {
        previousImage();
      }
    });
  </script>

</body>
</html>
