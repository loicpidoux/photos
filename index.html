<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loïc Pidoux — Photographies</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, 'Times New Roman', serif;
      background: #ffffff;
      color: #111;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid #eee;
      padding: 28px 14vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(6px);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    nav {
      display: flex;
      gap: 36px;
      font-size: 14px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    nav a {
      color: inherit;
      text-decoration: none;
    }

    main {
      padding: 90px 0 80px;
    }

    .photo {
      width: 70vw;
      max-width: 1200px;
      margin: 0 auto 70px;
    }

    .photo img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      width: 70vw;
      max-width: 1200px;
      margin: 0 auto 60px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      font-size: 13px;
      letter-spacing: 0.05em;
    }

    footer a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
    }

    @media (max-width: 900px) {
      header {
        padding: 24px 24px;
        flex-direction: column;
        align-items: flex-start;
        gap: 18px;
      }

      h1 {
        font-size: 20px;
      }

      nav {
        gap: 20px;
        font-size: 12px;
      }

      main {
        padding-top: 50px;
      }

      .photo {
        width: calc(100vw - 32px);
        margin-bottom: 36px;
      }

      footer {
        width: calc(100vw - 32px);
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Loïc Pidoux</h1>

    <nav>
      <a href="#">Personal</a>
      <a href="#">Works</a>
      <a href="mailto:pidouxloic@gmail.com">Contact</a>
    </nav>
  </header>

  <main>
    <main>
  <div class="photo">
    <img src="images/photo-1.jpg" alt="">
  </div>

  <div class="photo">
    <img src="images/photo-2.jpg" alt="">
  </div>

  <div class="photo">
    <img src="images/photo-3.jpg" alt="">
  </div>

  <div class="photo">
    <img src="images/photo-4.jpg" alt="">
  </div>

  <div class="photo">
    <img src="images/photo-5.jpg" alt="">
  </div>

  <div class="photo">
    <img src="images/photo-06.jpg" alt="">
  </div>

  <div class="photo">
    <img src="images/photo-7.jpg" alt="">
  </div>

  <div class="photo">
    <img src="images/photo-8.jpg" alt="">
  </div>

  <div class="photo">
    <img src="images/photo-9.jpg" alt="">
  </div>

  <div class="photo">
    <img src="images/photo-10.jpg" alt="">
  </div>
      
  <div class="photo">

  </main>

  <footer>
    <div>© Loïc Pidoux</div>
    <div><a href="mailto:pidouxloic@gmail.com">pidouxloic@gmail.com</a></div>
  </footer>

</body>
</html>
