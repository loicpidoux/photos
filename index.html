<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Loïc Pidoux — Photographies</title>
  <style>
    body {
      margin: 40px;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
    }

    h1 {
      font-size: 32px;
      font-weight: normal;
      margin-bottom: 10px;
    }

    p {
      max-width: 600px;
      line-height: 1.5;
    }

    .gallery {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .gallery img {
      width: 100%;
      height: auto;
      display: block;
    }

    .contact {
      margin-top: 50px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <h1>Loïc Pidoux — Photographies</h1>

  <p>
    Sélection de photographies, repérages et images personnelles.
  </p>

  <div class="gallery">
    <img src="images/photo-01.jpg" alt="">
    <img src="images/photo-02.jpg" alt="">
    <img src="images/photo-03.jpg" alt="">
  </div>

  <div class="contact">
    Contact : tonmail@example.com
  </div>
</body>
</html>
