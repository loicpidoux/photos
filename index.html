<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loïc Pidoux — Photographies</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f1ec;
      color: #111;
    }

    header {
      padding: 48px 40px 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 30px;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 72px);
      font-weight: 400;
      letter-spacing: -0.04em;
      line-height: 0.95;
    }

    .intro {
      max-width: 360px;
      font-size: 15px;
      line-height: 1.5;
      padding-top: 8px;
    }

    .gallery {
      padding: 20px 40px 60px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .gallery img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      display: block;
      filter: grayscale(10%);
      transition: transform 0.25s ease, filter 0.25s ease;
    }

    .gallery img:hover {
      transform: scale(0.985);
      filter: grayscale(0%);
    }

    footer {
      padding: 0 40px 40px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
    }

    @media (max-width: 900px) {
      header {
        flex-direction: column;
      }

      .gallery {
        grid-template-columns: 1fr;
      }

      .gallery img {
        height: auto;
      }

      footer {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Loïc Pidoux<br>Photographies</h1>

    <div class="intro">
      Sélection de photographies, repérages et images personnelles.
    </div>
  </header>

  <main class="gallery">
    <img src="images/photo-01.jpg" alt="">
    <img src="images/photo-02.jpg" alt="">
    <img src="images/photo-03.jpg" alt="">
  </main>

  <footer>
    <div>© Loïc Pidoux</div>
    <div><a href="mailto:pidouxloic@gmail.com">pidouxloic@gmail.com</a></div>
  </footer>

</body>
</html>
